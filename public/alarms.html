<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DeployWatch | Alarms</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1116;
    --bg2: #181d27;
    --panel: #212938;
    --line: rgba(255,255,255,0.13);
    --text: #edf1f9;
    --muted: #9aa5bb;
    --blue: #38bdf8;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at 10% 0%, rgba(56,189,248,0.2), transparent 35%),
      radial-gradient(circle at 100% 100%, rgba(34,197,94,0.16), transparent 45%),
      var(--bg);
    min-height: 100vh;
  }

  .top {
    position: sticky;
    top: 0;
    z-index: 3;
    border-bottom: 1px solid var(--line);
    background: rgba(15,17,22,0.94);
    backdrop-filter: blur(5px);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .title { font-size: 20px; font-weight: 700; }
  .sub { font-size: 12px; color: var(--muted); }
  .spacer { flex: 1; }

  .btn, .field, select, textarea {
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    padding: 0 10px;
    height: 34px;
  }
  textarea { height: 94px; padding: 8px 10px; resize: vertical; }

  .btn { cursor: pointer; font-weight: 600; }
  .btn.primary { background: linear-gradient(135deg, var(--blue), #0ea5e9); border: 0; color: #041a2a; }
  .btn.warn { border-color: rgba(245,158,11,0.5); color: var(--amber); }
  .btn.danger { border-color: rgba(239,68,68,0.5); color: var(--red); }

  .wrap { padding: 14px 16px 20px; display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 12px; }
  .panel { background: var(--bg2); border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
  .panel-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }

  .creator { grid-column: span 4; }
  .alarms { grid-column: span 8; }

  .f { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .f label { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .toolbar {
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: 1.2fr 1fr 1fr auto auto;
    gap: 8px;
  }

  .table-wrap { max-height: 72vh; overflow: auto; border-radius: 10px; border: 1px solid var(--line); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    position: sticky;
    top: 0;
    background: #222b3d;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: left;
    padding: 9px 8px;
    border-bottom: 1px solid var(--line);
  }
  tbody td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.06); vertical-align: top; }
  tbody tr:hover { background: rgba(56,189,248,0.08); }

  .mono { font-family: 'JetBrains Mono', monospace; }
  .badge { border-radius: 999px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
  .b-ok { color: var(--green); background: rgba(34,197,94,0.12); }
  .b-alarm { color: var(--red); background: rgba(239,68,68,0.12); }
  .b-ins { color: var(--amber); background: rgba(245,158,11,0.12); }

  .small-btn {
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: #2a3347;
    color: var(--text);
    padding: 0 8px;
    font-size: 11px;
    cursor: pointer;
  }

  @media (max-width: 1220px) {
    .creator, .alarms { grid-column: span 12; }
    .toolbar { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
  <div class="top">
    <div>
      <div class="title">Alarms Management</div>
      <div class="sub" id="status">Create, tune, and control CloudWatch alarms</div>
    </div>
    <div class="spacer"></div>
    <a href="/" class="btn" style="text-decoration:none;display:inline-flex;align-items:center;">Back</a>
    <a href="/observability.html" class="btn" style="text-decoration:none;display:inline-flex;align-items:center;">Observability</a>
    <a href="/logs.html" class="btn" style="text-decoration:none;display:inline-flex;align-items:center;">Logs</a>
  </div>

  <div class="wrap">
    <div class="panel creator">
      <div class="panel-title">Create or Update Alarm</div>

      <div class="f">
        <label>Template</label>
        <select id="template"></select>
      </div>

      <div class="f"><label>Name</label><input class="field" id="name" placeholder="deploywatch-prod-cpu-high" /></div>
      <div class="f"><label>Description</label><input class="field" id="description" placeholder="CPU above threshold" /></div>
      <div class="row2">
        <div class="f"><label>Metric</label><input class="field" id="metric" /></div>
        <div class="f"><label>Namespace</label><input class="field" id="namespace" /></div>
      </div>

      <div class="row2">
        <div class="f"><label>Threshold</label><input class="field" id="threshold" type="number" value="80" /></div>
        <div class="f"><label>Comparison</label><select id="comparison"></select></div>
      </div>

      <div class="row2">
        <div class="f"><label>Evaluation Periods</label><select id="evaluationPeriods"></select></div>
        <div class="f"><label>Period (seconds)</label><select id="period"></select></div>
      </div>

      <div class="f"><label>Statistic</label><select id="statistic"></select></div>
      <div class="f"><label>SNS Topic ARN (optional)</label><input class="field" id="snsTopicArn" placeholder="arn:aws:sns:..." /></div>
      <div class="f"><label>Dimensions JSON</label><textarea id="dimensions"></textarea></div>

      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn primary" id="save">Save Alarm</button>
        <button class="btn warn" id="presets">Setup Recommended Presets</button>
      </div>
    </div>

    <div class="panel alarms">
      <div class="panel-title">Current Alarms</div>
      <div class="toolbar">
        <input class="field" id="search" placeholder="Search by alarm name" />
        <select id="stateFilter"><option value="all">All states</option><option value="ALARM">ALARM</option><option value="OK">OK</option><option value="INSUFFICIENT_DATA">INSUFFICIENT_DATA</option></select>
        <select id="actionFilter"><option value="all">All action modes</option><option value="enabled">Actions enabled</option><option value="disabled">Actions disabled</option></select>
        <button class="btn" id="refresh">Refresh</button>
        <button class="btn" id="auto">Enable Auto Refresh</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:180px;">Alarm</th>
              <th style="width:100px;">State</th>
              <th style="width:190px;">Metric</th>
              <th style="width:70px;">Threshold</th>
              <th style="width:90px;">Actions</th>
              <th style="width:220px;">Updated</th>
              <th style="width:230px;">Controls</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
let optionsCache = null;
let alarmsCache = [];
let auto = false;
let timer;

function routingQuery() {
  const p = new URLSearchParams(window.location.search || '');
  if (!p.has('betaversion')) return '';
  const v = p.get('betaversion');
  return v == null || v === '' ? 'betaversion=1' : `betaversion=${encodeURIComponent(v)}`;
}

function withRouting(url) {
  const rq = routingQuery();
  if (!rq) return url;
  const sep = url.includes('?') ? '&' : '?';
  return `${url}${sep}${rq}`;
}

async function api(url, options) {
  const res = await fetch(withRouting(url), options);
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
  return body;
}

function badge(state) {
  if (state === 'ALARM') return '<span class="badge b-alarm">ALARM</span>';
  if (state === 'OK') return '<span class="badge b-ok">OK</span>';
  return '<span class="badge b-ins">INSUFFICIENT_DATA</span>';
}

function fillSelect(id, values) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  values.forEach((v) => {
    const o = document.createElement('option');
    o.value = String(v);
    o.textContent = String(v);
    el.appendChild(o);
  });
}

function applyTemplate(index) {
  if (!optionsCache || !optionsCache.recommendedMetrics) return;
  const t = optionsCache.recommendedMetrics[index];
  if (!t) return;

  document.getElementById('metric').value = t.metric || '';
  document.getElementById('namespace').value = t.namespace || '';
  document.getElementById('dimensions').value = JSON.stringify(t.dimensions || [], null, 2);
}

function filterAlarms() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const stateFilter = document.getElementById('stateFilter').value;
  const actionFilter = document.getElementById('actionFilter').value;

  const rows = document.getElementById('rows');
  rows.innerHTML = '';

  alarmsCache
    .filter((a) => {
      if (q && !String(a.name || '').toLowerCase().includes(q)) return false;
      if (stateFilter !== 'all' && a.state !== stateFilter) return false;
      if (actionFilter === 'enabled' && !a.actionsEnabled) return false;
      if (actionFilter === 'disabled' && a.actionsEnabled) return false;
      return true;
    })
    .forEach((a) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="mono">${a.name || '-'}</td>
        <td>${badge(a.state)}</td>
        <td class="mono">${a.namespace || '-'} | ${a.metric || '-'}</td>
        <td class="mono">${a.threshold == null ? '-' : a.threshold}</td>
        <td>${a.actionsEnabled ? 'enabled' : 'disabled'}</td>
        <td class="mono">${a.updatedAt ? new Date(a.updatedAt).toLocaleString() : '-'}</td>
        <td>
          <button class="small-btn" data-act="toggle" data-name="${a.name}" data-enabled="${a.actionsEnabled}">${a.actionsEnabled ? 'Disable actions' : 'Enable actions'}</button>
          <button class="small-btn" data-act="delete" data-name="${a.name}" style="border-color: rgba(239,68,68,0.5); color:#ef4444;">Delete</button>
        </td>
      `;
      rows.appendChild(tr);
    });
}

async function loadOptions() {
  const data = await api('/api/alarms/options');
  optionsCache = data;

  fillSelect('comparison', data.comparisonOperators || []);
  fillSelect('period', data.periods || []);
  fillSelect('evaluationPeriods', data.evaluationPeriods || []);
  fillSelect('statistic', data.statistics || []);

  const template = document.getElementById('template');
  template.innerHTML = '';
  (data.recommendedMetrics || []).forEach((t, idx) => {
    const o = document.createElement('option');
    o.value = String(idx);
    o.textContent = t.label;
    template.appendChild(o);
  });

  applyTemplate(0);
}

async function loadAlarms() {
  const data = await api('/api/alarms');
  alarmsCache = data.alarms || [];
  filterAlarms();
  document.getElementById('status').textContent = `Loaded ${alarmsCache.length} alarms at ${new Date().toLocaleTimeString()}`;
}

async function saveAlarm() {
  let dimensions;
  try {
    dimensions = JSON.parse(document.getElementById('dimensions').value || '[]');
    if (!Array.isArray(dimensions)) throw new Error('Dimensions must be an array');
  } catch (err) {
    document.getElementById('status').textContent = `Invalid dimensions JSON: ${err.message}`;
    return;
  }

  const payload = {
    name: document.getElementById('name').value.trim(),
    description: document.getElementById('description').value.trim(),
    metric: document.getElementById('metric').value.trim(),
    namespace: document.getElementById('namespace').value.trim(),
    threshold: Number(document.getElementById('threshold').value),
    comparisonOperator: document.getElementById('comparison').value,
    evaluationPeriods: Number(document.getElementById('evaluationPeriods').value),
    period: Number(document.getElementById('period').value),
    statistic: document.getElementById('statistic').value,
    snsTopicArn: document.getElementById('snsTopicArn').value.trim(),
    dimensions,
  };

  if (!payload.name || !payload.metric || !payload.namespace || Number.isNaN(payload.threshold)) {
    document.getElementById('status').textContent = 'Name, metric, namespace, and threshold are required';
    return;
  }

  await api('/api/alarms', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });

  document.getElementById('status').textContent = 'Alarm saved';
  await loadAlarms();
}

async function setupPresets() {
  await api('/api/alarms/presets', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ snsTopicArn: document.getElementById('snsTopicArn').value.trim() || undefined }),
  });
  document.getElementById('status').textContent = 'Preset alarms configured';
  await loadAlarms();
}

async function rowAction(action, name, enabled) {
  if (!name) return;

  if (action === 'delete') {
    await api(`/api/alarms/${encodeURIComponent(name)}`, { method: 'DELETE' });
    await loadAlarms();
    return;
  }

  if (action === 'toggle') {
    const path = enabled === 'true' ? 'disable-actions' : 'enable-actions';
    await api(`/api/alarms/${encodeURIComponent(name)}/${path}`, { method: 'POST' });
    await loadAlarms();
  }
}

function toggleAuto() {
  auto = !auto;
  const btn = document.getElementById('auto');
  btn.textContent = auto ? 'Disable Auto Refresh' : 'Enable Auto Refresh';
  clearInterval(timer);

  if (auto) {
    timer = setInterval(() => {
      loadAlarms().catch((e) => {
        document.getElementById('status').textContent = `Auto refresh failed: ${e.message}`;
      });
    }, 15000);
  }
}

document.getElementById('template').addEventListener('change', (e) => applyTemplate(Number(e.target.value)));
document.getElementById('save').addEventListener('click', () => saveAlarm().catch((e) => {
  document.getElementById('status').textContent = `Save failed: ${e.message}`;
}));
document.getElementById('presets').addEventListener('click', () => setupPresets().catch((e) => {
  document.getElementById('status').textContent = `Preset setup failed: ${e.message}`;
}));
document.getElementById('refresh').addEventListener('click', () => loadAlarms().catch(() => {}));
document.getElementById('auto').addEventListener('click', toggleAuto);
document.getElementById('search').addEventListener('input', filterAlarms);
document.getElementById('stateFilter').addEventListener('change', filterAlarms);
document.getElementById('actionFilter').addEventListener('change', filterAlarms);

document.getElementById('rows').addEventListener('click', (e) => {
  const t = e.target;
  if (!(t instanceof HTMLElement)) return;
  const action = t.getAttribute('data-act');
  if (!action) return;
  rowAction(action, t.getAttribute('data-name'), t.getAttribute('data-enabled')).catch((err) => {
    document.getElementById('status').textContent = `Action failed: ${err.message}`;
  });
});

Promise.all([loadOptions(), loadAlarms()]).catch((e) => {
  document.getElementById('status').textContent = `Load failed: ${e.message}`;
});
</script>
</body>
</html>
