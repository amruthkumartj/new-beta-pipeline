<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DeployWatch | Observability</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #091017;
    --bg-soft: #0f1822;
    --panel: #131f2b;
    --panel-2: #182838;
    --text: #dfe9f4;
    --muted: #8aa0b7;
    --line: rgba(148, 177, 204, 0.22);
    --cyan: #2dd4bf;
    --blue: #60a5fa;
    --amber: #f59e0b;
    --green: #22c55e;
    --red: #ef4444;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at 85% 0%, rgba(45, 212, 191, 0.18), transparent 35%),
      radial-gradient(circle at 0% 100%, rgba(96, 165, 250, 0.2), transparent 45%),
      var(--bg);
    min-height: 100vh;
  }

  .top {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(9, 16, 23, 0.92);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--line);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .title { font-size: 20px; font-weight: 700; letter-spacing: 0.02em; }
  .sub { font-size: 12px; color: var(--muted); }
  .spacer { flex: 1; }
  .btn, select {
    height: 34px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text);
    padding: 0 12px;
    font-family: inherit;
    font-size: 13px;
  }
  .btn { cursor: pointer; font-weight: 600; }
  .btn.primary {
    background: linear-gradient(135deg, var(--cyan), #0ea5e9);
    border: 0;
    color: #062031;
  }

  .wrap {
    padding: 18px 20px 30px;
    display: grid;
    grid-template-columns: repeat(12, minmax(0, 1fr));
    gap: 14px;
  }

  .panel {
    background: linear-gradient(180deg, rgba(24, 40, 56, 0.95), rgba(18, 31, 43, 0.9));
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
  }

  .kpi-grid {
    grid-column: span 12;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }

  .kpi {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px;
  }
  .kpi .name { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .kpi .val { font-size: 26px; margin-top: 6px; font-weight: 700; }

  .chart-panel { grid-column: span 8; }
  .collage-panel { grid-column: span 4; }
  .section-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }

  .chart-wrap { height: 340px; }
  .list { display: flex; flex-direction: column; gap: 8px; max-height: 340px; overflow: auto; }
  .row {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: center;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .pill {
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid transparent;
  }
  .ok { color: var(--green); background: rgba(34, 197, 94, 0.12); border-color: rgba(34, 197, 94, 0.3); }
  .warn { color: var(--amber); background: rgba(245, 158, 11, 0.12); border-color: rgba(245, 158, 11, 0.3); }
  .err { color: var(--red); background: rgba(239, 68, 68, 0.12); border-color: rgba(239, 68, 68, 0.3); }

  .bars .bar-row { margin-bottom: 8px; }
  .bars .label { font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 4px; }
  .track { height: 9px; border-radius: 10px; background: #0a1119; border: 1px solid var(--line); overflow: hidden; }
  .fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--blue)); }

  @media (max-width: 1100px) {
    .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .chart-panel, .collage-panel { grid-column: span 12; }
  }
</style>
</head>
<body>
  <div class="top">
    <div>
      <div class="title">Observability</div>
      <div class="sub" id="updated">Loading live metrics...</div>
    </div>
    <div class="spacer"></div>
    <a href="/" class="btn" style="text-decoration:none;display:inline-flex;align-items:center;">Back to Deployments</a>
    <a href="/logs.html" class="btn" style="text-decoration:none;display:inline-flex;align-items:center;">Logs</a>
    <a href="/alarms.html" class="btn" style="text-decoration:none;display:inline-flex;align-items:center;">Alarms</a>
    <select id="minutes">
      <option value="30">Last 30m</option>
      <option value="60" selected>Last 1h</option>
      <option value="180">Last 3h</option>
      <option value="360">Last 6h</option>
    </select>
    <button class="btn primary" id="refresh">Refresh now</button>
  </div>

  <div class="wrap">
    <div class="kpi-grid">
      <div class="kpi"><div class="name">Prod CPU</div><div class="val mono" id="kpi-prod-cpu">-</div></div>
      <div class="kpi"><div class="name">Prod Memory</div><div class="val mono" id="kpi-prod-mem">-</div></div>
      <div class="kpi"><div class="name">Beta CPU</div><div class="val mono" id="kpi-beta-cpu">-</div></div>
      <div class="kpi"><div class="name">Beta Memory</div><div class="val mono" id="kpi-beta-mem">-</div></div>
    </div>

    <div class="panel chart-panel">
      <div class="section-title">Cluster CPU and Memory Timeline</div>
      <div class="chart-wrap"><canvas id="seriesChart"></canvas></div>
    </div>

    <div class="panel collage-panel">
      <div class="section-title">Cluster Collage</div>
      <div class="list" id="clusterList"></div>
    </div>

    <div class="panel" style="grid-column: span 6;">
      <div class="section-title">DB ACL Pressure</div>
      <div class="bars" id="aclBars"></div>
    </div>

    <div class="panel" style="grid-column: span 6;">
      <div class="section-title">Valkey Key Volume</div>
      <div class="bars" id="valkeyBars"></div>
    </div>
  </div>

<script>
let chart;
let timer;

function routingQuery() {
  const p = new URLSearchParams(window.location.search || '');
  if (!p.has('betaversion')) return '';
  const v = p.get('betaversion');
  return v == null || v === '' ? 'betaversion=1' : `betaversion=${encodeURIComponent(v)}`;
}

function withRouting(url) {
  const rq = routingQuery();
  if (!rq) return url;
  const sep = url.includes('?') ? '&' : '?';
  return `${url}${sep}${rq}`;
}

async function api(url, options) {
  const res = await fetch(withRouting(url), options);
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
  return body;
}

function fmtPct(v) {
  return v == null ? '-' : `${Math.round(v)}%`;
}

function tailValue(points) {
  if (!points || !points.length) return null;
  const last = points[points.length - 1];
  return last ? last.value : null;
}

function renderBars(containerId, rows, keyName, valueName) {
  const root = document.getElementById(containerId);
  root.innerHTML = '';
  if (!rows || !rows.length) {
    root.textContent = 'No data';
    return;
  }
  const max = Math.max(...rows.map((r) => Number(r[valueName] || 0)), 1);
  rows.forEach((row) => {
    const value = Number(row[valueName] || 0);
    const pct = Math.max(2, Math.round((value / max) * 100));
    const el = document.createElement('div');
    el.className = 'bar-row';
    el.innerHTML = `
      <div class="label"><span>${row[keyName]}</span><span class="mono">${value}</span></div>
      <div class="track"><div class="fill" style="width:${pct}%"></div></div>
    `;
    root.appendChild(el);
  });
}

function makeDataset(label, data, color) {
  return {
    label,
    data,
    borderColor: color,
    backgroundColor: color,
    pointRadius: 0,
    borderWidth: 2,
    tension: 0.25,
  };
}

function renderChart(series) {
  const labels = (series.prod.cpu || []).map((p) => new Date(p.time).toLocaleTimeString('en-US', { hour12: false }));
  const datasets = [
    makeDataset('Prod CPU', (series.prod.cpu || []).map((p) => p.value), '#22c55e'),
    makeDataset('Prod Memory', (series.prod.memory || []).map((p) => p.value), '#60a5fa'),
    makeDataset('Beta CPU', (series.beta.cpu || []).map((p) => p.value), '#f59e0b'),
    makeDataset('Beta Memory', (series.beta.memory || []).map((p) => p.value), '#2dd4bf'),
  ];

  if (!chart) {
    chart = new Chart(document.getElementById('seriesChart'), {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: { min: 0, max: 100, grid: { color: 'rgba(138,160,183,0.15)' }, ticks: { color: '#8aa0b7' } },
          x: { grid: { color: 'rgba(138,160,183,0.07)' }, ticks: { color: '#8aa0b7', maxTicksLimit: 8 } },
        },
        plugins: {
          legend: { labels: { color: '#dfe9f4' } },
        },
      },
    });
    return;
  }

  chart.data.labels = labels;
  chart.data.datasets = datasets;
  chart.update();
}

function nodeState(cpu) {
  if (cpu == null) return { cls: 'warn', text: 'No data' };
  if (cpu >= 80) return { cls: 'err', text: 'Hot' };
  if (cpu >= 60) return { cls: 'warn', text: 'Elevated' };
  return { cls: 'ok', text: 'Healthy' };
}

function renderClusterCollage(prodNodes, betaNodes) {
  const root = document.getElementById('clusterList');
  root.innerHTML = '';

  [
    { name: 'Production', nodes: prodNodes || [] },
    { name: 'Beta', nodes: betaNodes || [] },
  ].forEach((cluster) => {
    (cluster.nodes.length ? cluster.nodes : [{ label: 'none', cpu: null }]).forEach((n) => {
      const state = nodeState(n.cpu);
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <div>
          <div style="font-size:13px;font-weight:600;">${cluster.name} | ${n.label || 'task'}</div>
          <div class="mono" style="font-size:11px;color:var(--muted);">CPU ${n.cpu == null ? '-' : Math.round(n.cpu) + '%'}</div>
        </div>
        <div class="pill ${state.cls}">${state.text}</div>
      `;
      root.appendChild(row);
    });
  });
}

async function loadAll() {
  const minutes = Number(document.getElementById('minutes').value || 60);
  const [series, prodNodes, betaNodes, acl, valkeys] = await Promise.all([
    api(`/api/metrics/cluster-series?minutes=${minutes}&period=60`),
    api('/api/metrics/nodes?cluster=prod'),
    api('/api/metrics/nodes?cluster=beta'),
    api('/api/metrics/db-acls'),
    api('/api/metrics/valkeys'),
  ]);

  document.getElementById('kpi-prod-cpu').textContent = fmtPct(tailValue(series.prod.cpu));
  document.getElementById('kpi-prod-mem').textContent = fmtPct(tailValue(series.prod.memory));
  document.getElementById('kpi-beta-cpu').textContent = fmtPct(tailValue(series.beta.cpu));
  document.getElementById('kpi-beta-mem').textContent = fmtPct(tailValue(series.beta.memory));

  renderChart(series);
  renderClusterCollage(prodNodes.nodes, betaNodes.nodes);
  renderBars('aclBars', acl.acls || [], 'name', 'value');
  renderBars('valkeyBars', valkeys.valkeys || [], 'shard', 'keys');
  document.getElementById('updated').textContent = `Last update: ${new Date().toLocaleTimeString()}`;
}

function startAuto() {
  clearInterval(timer);
  timer = setInterval(() => { loadAll().catch((e) => {
    document.getElementById('updated').textContent = `Update failed: ${e.message}`;
  }); }, 15000);
}

document.getElementById('refresh').addEventListener('click', () => loadAll().catch((e) => {
  document.getElementById('updated').textContent = `Refresh failed: ${e.message}`;
}));

document.getElementById('minutes').addEventListener('change', () => loadAll().catch(() => {}));

loadAll().catch((e) => {
  document.getElementById('updated').textContent = `Load failed: ${e.message}`;
});
startAuto();
</script>
</body>
</html>
